<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Three.js Nuclear Explosion Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; }
        canvas { display: block; }
        #info {
            position: absolute; top: 10px; left: 10px; color: white;
            font-family: sans-serif; pointer-events: none; text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <div id="info">Симуляция ядерного взрыва на Three.js</div>

    <!-- Подключаем Three.js через CDN -->
    <script src="https://cloudflare.com"></script>

    <script>
        // --- Настройки и изменяемые параметры взрыва ---
        const CONFIG = {
            particleCount: 15000,    // Общее количество частиц
            yieldPower: 1.8,         // Мощность взрыва (влияет на финальный размер)
            riseSpeed: 0.12,         // Скорость подъема гриба
            expansionSpeed: 0.15,    // Скорость расширения купола
            duration: 8.0            // Длительность активной фазы в секундах
        };

        // --- Инициализация сцены ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.015);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 20, 60);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Добавление земли и освещения ---
        const grid = new THREE.GridHelper(200, 50, 0x444444, 0x222222);
        grid.position.y = -0.1;
        scene.add(grid);

        const flashLight = new THREE.PointLight(0xffaa44, 10, 100);
        flashLight.position.set(0, 2, 0);
        scene.add(flashLight);

        // --- Создание системы частиц ---
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(CONFIG.particleCount * 3);
        const colors = new Float32Array(CONFIG.particleCount * 3);
        
        // Кастомные свойства для анимации каждой отдельной частицы
        const pTypes = new Float32Array(CONFIG.particleCount); // 0: вспышка, 1: ножка, 2: шляпка
        const pSpeed = new Float32Array(CONFIG.particleCount);
        const pDirections = new Float32Array(CONFIG.particleCount * 3);

        const colorObj = new THREE.Color();

        for (let i = 0; i < CONFIG.particleCount; i++) {
            // Начальная точка — эпицентр
            positions[i * 3] = 0;
            positions[i * 3 + 1] = 0;
            positions[i * 3 + 2] = 0;

            // Распределение частиц по зонам анатомии взрыва
            const rand = Math.random();
            if (rand < 0.2) {
                pTypes[i] = 0; // Огненный шар / Сфера вспышки
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(Math.random() * 2 - 1);
                pDirections[i * 3] = Math.sin(phi) * Math.cos(theta);
                pDirections[i * 3 + 1] = Math.abs(Math.sin(phi) * Math.sin(theta)); // Больше вверх
                pDirections[i * 3 + 2] = Math.cos(phi);
                pSpeed[i] = (0.5 + Math.random() * 0.5) * CONFIG.expansionSpeed;
            } else if (rand < 0.5) {
                pTypes[i] = 1; // Столб дыма (ножка гриба)
                pDirections[i * 3] = (Math.random() * 2 - 1) * 0.15; 
                pDirections[i * 3 + 1] = (0.5 + Math.random() * 0.5) * CONFIG.riseSpeed; 
                pDirections[i * 3 + 2] = (Math.random() * 2 - 1) * 0.15;
                pSpeed[i] = 1.0;
            } else {
                pTypes[i] = 2; // Шляпка гриба
                const angle = Math.random() * Math.PI * 2;
                pDirections[i * 3] = Math.cos(angle); 
                pDirections[i * 3 + 1] = (Math.random() * 0.3); // Расползание по горизонтали
                pDirections[i * 3 + 2] = Math.sin(angle);
                pSpeed[i] = (0.3 + Math.random() * 0.7) * CONFIG.expansionSpeed;
            }

            // Базовый ярко-оранжевый цвет в начале взрыва
            colorObj.setHSL(0.08, 1.0, 0.6);
            colors[i * 3] = colorObj.r;
            colors[i * 3 + 1] = colorObj.g;
            colors[i * 3 + 2] = colorObj.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // Материал частиц (эффект светящегося газа)
        const material = new THREE.PointsMaterial({
            size: 0.6,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending, // Сложение цветов для эффекта горения
            depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- Цикл анимации ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            
            // Сброс анимации по циклу
            if (elapsedTime > CONFIG.duration) {
                clock.start();
                resetParticles();
                return;
            }

            const posAttr = geometry.attributes.position;
            const colorAttr = geometry.attributes.color;

            // Управление яркостью общей вспышки света
            flashLight.intensity = Math.max(0, (1.0 - (elapsedTime / 2.0))) * 15;

            for (let i = 0; i < CONFIG.particleCount; i++) {
                let x = posAttr.getX(i);
                let y = posAttr.getY(i);
                let z = posAttr.getZ(i);

                const type = pTypes[i];
                const speed = pSpeed[i];

                if (type === 0) {
                    // Разлет сферы вспышки
                    x += pDirections[i * 3] * speed * CONFIG.yieldPower;
                    y += pDirections[i * 3 + 1] * speed * CONFIG.yieldPower;
                    z += pDirections[i * 3 + 2] * speed * CONFIG.yieldPower;
                } else if (type === 1) {
                    // Рост ножки гриба вверх
                    if (y < 25 * CONFIG.yieldPower) {
                        x += pDirections[i * 3] * speed;
                        y += pDirections[i * 3 + 1] * speed;
                        z += pDirections[i * 3 + 2] * speed;
                    }
                } else if (type === 2) {
                    // Формирование купола (подъем + расширение на высоте)
                    const targetHeight = 22 * CONFIG.yieldPower;
                    if (y < targetHeight) {
                        // Поднимаемся в составе ножки
                        y += CONFIG.riseSpeed * 1.5;
                        x += (Math.random() * 2 - 1) * 0.05;
                        z += (Math.random() * 2 - 1) * 0.05;
                    } else {
                        // Расползаемся в стороны, формируя «шляпку»
                        x += pDirections[i * 3] * speed * 0.8;
                        y += pDirections[i * 3 + 1] * speed * 0.3 + (Math.sin(elapsedTime * 2) * 0.02);
                        z += pDirections[i * 3 + 2] * speed * 0.8;
                    }
                }

                posAttr.setXYZ(i, x, y, z);

                // Динамическое изменение цвета: Огонь -> Дым -> Затухание
                const lifeRatio = elapsedTime / CONFIG.duration;
                let r, g, b;

                if (lifeRatio < 0.2) {
                    // Бело-желтая ядерная вспышка
                    r = 1.0; g = 0.9; b = 0.7;
                } else if (lifeRatio < 0.5) {
                    // Переход в пламенный оранжево-красный
                    r = 1.0;
                    g = Math.max(0, 0.6 - (lifeRatio * 0.5));
                    b = 0.0;
                } else {
                    // Остывание в серый пепел и темный дым
                    const smokeDarkness = Math.max(0.05, 1.0 - lifeRatio);
                    r = smokeDarkness * 0.4;
                    g = smokeDarkness * 0.35;
                    b = smokeDarkness * 0.35;
                }

                colorAttr.setXYZ(i, r, g, b);
            }

            posAttr.needsUpdate = true;
            colorAttr.needsUpdate = true;

            // Медленное вращение сцены для обзора
            particleSystem.rotation.y += 0.002;

            renderer.render(scene, camera);
        }

        function resetParticles() {
            const posAttr = geometry.attributes.position;
            for (let i = 0; i < CONFIG.particleCount; i++) {
                posAttr.setXYZ(i, 0, 0, 0);
            }
            posAttr.needsUpdate = true;
        }

        // --- Адаптив окна ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Запуск
        animate();
    </script>
</body>
</html>
