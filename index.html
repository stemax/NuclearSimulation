<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Three.js Nuclear Explosion Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; }
        canvas { display: block; }
        #info {
            position: absolute; top: 10px; left: 10px; color: white;
            font-family: sans-serif; pointer-events: none; text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <div id="info">Симуляция ядерного взрыва на Three.js</div>

    <!-- Подключаем Three.js через CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- Параметры конфигурации ---
        const CONFIG = {
            particleCount: 18000,
            yieldPower: 2.0,         
            riseSpeed: 0.15,         
            expansionSpeed: 0.18,    
            duration: 9.0,
            buildingCount: 350       // Количество генерируемых зданий
        };

        // --- Инициализация сцены ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.012);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 35, 75);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Земля
        const groundGeo = new THREE.PlaneGeometry(300, 300);
        const groundMat = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = Math.PI / 2;
        scene.add(ground);

        // Освещение от вспышки
        const flashLight = new THREE.PointLight(0xff7700, 15, 150);
        flashLight.position.set(0, 2, 0);
        scene.add(flashLight);

        // --- Генерация 3D Города ---
        const buildings = [];
        const buildingGroup = new THREE.Group();
        scene.add(buildingGroup);

        function createCity() {
            // Удаляем старый город, если он был
            while(buildingGroup.children.length > 0) { 
                buildingGroup.remove(buildingGroup.children[0]); 
            }
            buildings.length = 0;

            const boxGeo = new THREE.BoxGeometry(1, 1, 1);

            for (let i = 0; i < CONFIG.buildingCount; i++) {
                // Случайные координаты города вокруг эпицентра (исключая самый центр)
                const angle = Math.random() * Math.PI * 2;
                const distance = 8 + Math.random() * 70; 
                const x = Math.cos(angle) * distance;
                const z = Math.sin(angle) * distance;

                // Случайные размеры небоскребов
                const w = 1.5 + Math.random() * 2.5;
                const h = 4 + Math.random() * (25 - distance * 0.2); // Чем дальше от центра, тем ниже здания
                const d = 1.5 + Math.random() * 2.5;

                // Начальный серый/неоновый цвет зданий мирного города
                const mat = new THREE.MeshBasicMaterial({
                    color: new THREE.Color().setHSL(0.6, 0.2, 0.3 + Math.random() * 0.2)
                });

                const mesh = new THREE.Mesh(boxGeo, mat);
                mesh.scale.set(w, h, d);
                // Сдвигаем опорную точку вниз, чтобы масштабирование шло от земли
                mesh.position.set(x, h / 2, z); 

                buildingGroup.add(mesh);

                // Сохраняем исходные параметры для анимации разрушения
                buildings.push({
                    mesh: mesh,
                    material: mat,
                    initialHeight: h,
                    distanceFromCenter: distance,
                    isDestroyed: false
                });
            }
        }

        // --- Создание эффектов взрыва (Система частиц) ---
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(CONFIG.particleCount * 3);
        const colors = new Float32Array(CONFIG.particleCount * 3);
        const pTypes = new Float32Array(CONFIG.particleCount); 
        const pSpeed = new Float32Array(CONFIG.particleCount);
        const pDirections = new Float32Array(CONFIG.particleCount * 3);

        for (let i = 0; i < CONFIG.particleCount; i++) {
            positions[i * 3] = positions[i * 3 + 1] = positions[i * 3 + 2] = 0;
            const rand = Math.random();

            if (rand < 0.25) {
                pTypes[i] = 0; // Взрывная волна и вспышка (сфера)
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(Math.random() * 2 - 1);
                pDirections[i * 3] = Math.sin(phi) * Math.cos(theta);
                pDirections[i * 3 + 1] = Math.abs(Math.sin(phi) * Math.sin(theta)) * 0.4; // Расплющенная к земле сфера
                pDirections[i * 3 + 2] = Math.cos(phi);
                pSpeed[i] = (0.6 + Math.random() * 0.4) * CONFIG.expansionSpeed;
            } else if (rand < 0.5) {
                pTypes[i] = 1; // Столб взрыва
                pDirections[i * 3] = (Math.random() * 2 - 1) * 0.1;
                pDirections[i * 3 + 1] = (0.6 + Math.random() * 0.4) * CONFIG.riseSpeed;
                pDirections[i * 3 + 2] = (Math.random() * 2 - 1) * 0.1;
                pSpeed[i] = 1.0;
            } else {
                pTypes[i] = 2; // Шляпка гриба
                const angle = Math.random() * Math.PI * 2;
                pDirections[i * 3] = Math.cos(angle);
                pDirections[i * 3 + 1] = (Math.random() * 0.2);
                pDirections[i * 3 + 2] = Math.sin(angle);
                pSpeed[i] = (0.4 + Math.random() * 0.6) * CONFIG.expansionSpeed;
            }
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.8,
            vertexColors: true,
            transparent: true,
            opacity: 0.85,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- Первичный запуск ---
        createCity();
        const clock = new THREE.Clock();

        // --- Главный игровой цикл анимации ---
        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // Автоматический перезапуск симуляции
            if (elapsedTime > CONFIG.duration) {
                clock.start();
                resetSimulation();
                return;
            }

            const posAttr = geometry.attributes.position;
            const colorAttr = geometry.attributes.color;

            flashLight.intensity = Math.max(0, (1.0 - (elapsedTime / 3.0))) * 25;

            // Текущий радиус поражения ударной волны
            const currentWaveRadius = elapsedTime * CONFIG.expansionSpeed * 65 * CONFIG.yieldPower;

            // 1. Физика частиц взрыва
            for (let i = 0; i < CONFIG.particleCount; i++) {
                let x = posAttr.getX(i);
                let y = posAttr.getY(i);
                let z = posAttr.getZ(i);
                const type = pTypes[i];
                const speed = pSpeed[i];

                if (type === 0) {
                    x += pDirections[i * 3] * speed * CONFIG.yieldPower;
                    y += pDirections[i * 3 + 1] * speed * CONFIG.yieldPower;
                    z += pDirections[i * 3 + 2] * speed * CONFIG.yieldPower;
                } else if (type === 1) {
                    if (y < 35 * CONFIG.yieldPower) {
                        x += pDirections[i * 3] * speed;
                        y += pDirections[i * 3 + 1] * speed;
                        z += pDirections[i * 3 + 2] * speed;
                    }
                } else if (type === 2) {
                    const cloudHeight = 30 * CONFIG.yieldPower;
                    if (y < cloudHeight) {
                        y += CONFIG.riseSpeed * 1.6;
                    } else {
                        x += pDirections[i * 3] * speed * 0.9;
                        y += pDirections[i * 3 + 1] * speed * 0.3;
                        z += pDirections[i * 3 + 2] * speed * 0.9;
                    }
                }

                posAttr.setXYZ(i, x, y, z);

                // Изменение цвета фаз горения
                const lifeRatio = elapsedTime / CONFIG.duration;
                let r, g, b;
                if (lifeRatio < 0.15) {
                    r = 1.0; g = 0.95; b = 0.8; // Вспышка рентгеновского излучения
                } else if (lifeRatio < 0.45) {
                    r = 1.0; g = 0.4 - (lifeRatio * 0.4); b = 0.0; // Огненный шар
                } else {
                    const c = Math.max(0.02, 0.9 - lifeRatio) * 0.35; // Радиоактивное облако пыли
                    r = c * 1.1; g = c; b = c;
                }
                colorAttr.setXYZ(i, r, g, b);
            }

            posAttr.needsUpdate = true;
            colorAttr.needsUpdate = true;

             buildings.forEach(b => {
                // Если ударная волна дошла до здания
                if (currentWaveRadius > b.distanceFromCenter) {
                    if (!b.isDestroyed) {
                        // Помечаем здание как уничтоженное взрывной волной
                        b.isDestroyed = true;
                        
                        // Меняем цвет материалов на обгоревший/пепельный
                        if (b.mesh.material) {
                            b.mesh.material.color.setHex(0x1a1a1a);
                        }
                    }

                    // Эффект плавного оседания и разрушения здания
                    if (b.mesh.scale.y > 0.05) {
                        // Складываем здание по вертикали (оседание)
                        b.mesh.scale.y -= 0.05 * CONFIG.yieldPower;
                        
                        // Смещаем позицию Y вниз, чтобы низ здания оставался на земле
                        b.mesh.position.y = (b.initialHeight * b.mesh.scale.y) / 2;
                        
                        // Немного наклоняем здание в сторону от эпицентра взрыва
                        const angle = Math.atan2(b.mesh.position.z, b.mesh.position.x);
                        b.mesh.rotation.z += Math.cos(angle) * 0.01;
                        b.mesh.rotation.x -= Math.sin(angle) * 0.01;
                    } else {
                        // Полностью разрушенное здание превращается в плоские руины
                        b.mesh.scale.y = 0.01;
                        b.mesh.position.y = 0.005;
                    }
                }
            });
  }

        // --- 3. Генерация города ---
        const buildings = [];
        const buildingGroup = new THREE.Group();
        scene.add(buildingGroup);

        function generateCity() {
            // Удаляем старые здания при перезапуске
            while(buildingGroup.children.length > 0){ 
                buildingGroup.remove(buildingGroup.children[0]); 
            }
            buildings.length = 0;

            const count = 150; // Количество зданий в городе
            for (let i = 0; i < count; i++) {
                // Случайные размеры дома
                const w = 1 + Math.random() * 2;
                const h = 3 + Math.random() * 8;
                const d = 1 + Math.random() * 2;

                const geometry = new THREE.BoxGeometry(w, h, d);
                // Используем уникальный материал для каждого здания, чтобы красить отдельно
                const material = new THREE.MeshBasicMaterial({ color: 0x556677 });
                const mesh = new THREE.Mesh(geometry, material);

                // Размещаем здания по кругу вокруг эпицентра, исключая сам центр
                const angle = Math.random() * Math.PI * 2;
                const radius = 15 + Math.random() * 60; // Радиус городской застройки

                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;

                mesh.position.set(x, h / 2, z);
                buildingGroup.add(mesh);

                // Сохраняем метаданные здания для механики уничтожения
                buildings.push({
                    mesh: mesh,
                    initialHeight: h,
                    distanceFromCenter: radius,
                    isDestroyed: false
                });
            }
        }

        // Создаем город при первом запуске
        generateCity();


        // --- 4. Обновленный цикл анимации ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            
            // Автоматический перезапуск симуляции по истечении времени
            if (elapsedTime > CONFIG.duration) {
                clock.start();
                resetSimulation();
                return;
            }

            const posAttr = geometry.attributes.position;
            const colorAttr = geometry.attributes.color;

            // Динамический радиус ударной волны (скорость * время)
            const currentWaveRadius = elapsedTime * 25.0 * CONFIG.expansionSpeed;

            // Запуск механики уничтожения зданий
            updateCityDestruction(currentWaveRadius);

            // Управление вспышкой света от взрыва
            flashLight.intensity = Math.max(0, (1.0 - (elapsedTime / 1.5))) * 25;

            // Анимация частиц взрыва (Гриб)
            for (let i = 0; i < CONFIG.particleCount; i++) {
                let x = posAttr.getX(i);
                let y = posAttr.getY(i);
                let z = posAttr.getZ(i);

                const type = pTypes[i];
                const speed = pSpeed[i];

                if (type === 0) {
                    x += pDirections[i * 3] * speed * CONFIG.yieldPower;
                    y += pDirections[i * 3 + 1] * speed * CONFIG.yieldPower;
                    z += pDirections[i * 3 + 2] * speed * CONFIG.yieldPower;
                } else if (type === 1) {
                    if (y < 25 * CONFIG.yieldPower) {
                        x += pDirections[i * 3] * speed;
                        y += pDirections[i * 3 + 1] * speed;
                        z += pDirections[i * 3 + 2] * speed;
                    }
                } else if (type === 2) {
                    const targetHeight = 22 * CONFIG.yieldPower;
                    if (y < targetHeight) {
                        y += CONFIG.riseSpeed * 1.5;
                        x += (Math.random() * 2 - 1) * 0.05;
                        z += (Math.random() * 2 - 1) * 0.05;
                    } else {
                        x += pDirections[i * 3] * speed * 0.8;
                        y += pDirections[i * 3 + 1] * speed * 0.3 + (Math.sin(elapsedTime * 2) * 0.02);
                        z += pDirections[i * 3 + 2] * speed * 0.8;
                    }
                }

                posAttr.setXYZ(i, x, y, z);

                // Эволюция цвета частиц (Огонь -> Дым)
                const lifeRatio = elapsedTime / CONFIG.duration;
                let r, g, b;

                if (lifeRatio < 0.15) {
                    r = 1.0; g = 0.95; b = 0.8;
                } else if (lifeRatio < 0.4) {
                    r = 1.0; g = Math.max(0, 0.5 - (lifeRatio * 0.4)); b = 0.0;
                } else {
                    const smoke = Math.max(0.05, 1.0 - lifeRatio);
                    r = smoke * 0.35; g = smoke * 0.3; b = smoke * 0.3;
                }

                colorAttr.setXYZ(i, r, g, b);
            }

            posAttr.needsUpdate = true;
            colorAttr.needsUpdate = true;

            // Медленный поворот камеры вокруг эпицентра для кинематографичности
            particleSystem.rotation.y += 0.0015;
            buildingGroup.rotation.y += 0.0015;

            renderer.render(scene, camera);
        }

        // --- 5. Функция полного сброса сцены ---
        function resetSimulation() {
            // Возвращаем все частицы взрыва в эпицентр
            const posAttr = geometry.attributes.position;
            for (let i = 0; i < CONFIG.particleCount; i++) {
                posAttr.setXYZ(i, 0, 0, 0);
            }
            posAttr.needsUpdate = true;

            // Перегенерируем город заново целым
            generateCity();
        }

        // --- Оптимизация под изменение размеров экрана ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Запуск основного цикла приложения
        animate();
    </script>
</body>
</html>
